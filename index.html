<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600;700&display=swap');
  :root{

  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Barlow',sans-serif;color:var(--ink);min-height:100vh;
       padding:0 0 calc(80px + var(--safe-bottom));background-color:#f5f6fa;touch-action:manipulation}

  header{padding:40px 0 4px}

  @media(max-width:540px){.controls{grid-template-columns:1fr}}

         position:relative;overflow:hidden}

    -webkit-user-select:none;user-select:none}

    font-weight:700;font-size:.95rem;letter-spacing:.2em;text-transform:uppercase;color:var(--red);margin-bottom:10px}

</head>

<script>
// ─── Core solver (unchanged from v1) ───────────────────────────────────────
var GAME=[ [[3,3],6],[[3,2],5],[[2,2],4],[[3,1],4],[[2,1],3],[[1,1],2] ];
function lex(x,y){for(var i=0;i<x.length;i++){if(x[i]!==y[i])return x[i]<y[i]?-1:1;}return 0;}
function solve(A,B){
  var total=A+B; if(total<2) return null;
  var results=[];
  (function rec(i,rem,counts){
    if(rem===0){results.push(counts.slice());return;}
    if(i===GAME.length) return;
    var sp=GAME[i][1];
    for(var c=0;c<=Math.floor(rem/sp);c++) rec(i+1,rem-c*sp,counts.concat([c]));
  })(0,total,[]);
  var best=null;
  for(var r=0;r<results.length;r++){
    var counts=results[r];
    var npitch=counts.reduce(function(a,b){return a+b;},0);
    if(!npitch) continue;
    var uneven=0,defi=0,imb=0,teamSizes=[],ones=0,oneTeams=0;
    counts.forEach(function(c,idx){ if(!c)return; var g=GAME[idx][0],tot=GAME[idx][1],s1=g[0],s2=g[1];
      for(var k=0;k<c;k++){teamSizes.push(s1,s2); if(!(s1===3&&s2===3))uneven++; defi+=6-tot; imb+=Math.abs(s1-s2); if(s1===1&&s2===1)ones++; if(s1===1)oneTeams++; if(s2===1)oneTeams++;}
    });
    if(ones>0 && total>2) continue;
    var dp={0:0};
    for(var ts=0;ts<teamSizes.length;ts++){ var s=teamSizes[ts],ndp={};
      for(var hs in dp){ var hsum=+hs,mixed=dp[hs];
        for(var h=0;h<=s;h++){ var a=s-h,nh=hsum+h; if(nh>A)continue;
          var nm=mixed+((h===s||a===s)?0:1);
          if(ndp[nh]===undefined||ndp[nh]>nm) ndp[nh]=nm; } }
      dp=ndp; }
    if(dp[A]===undefined) continue;
    var score=[oneTeams,uneven,imb,defi,dp[A],npitch];
    if(best===null||lex(score,best.score)<0) best={score:score,counts:counts,mixed:dp[A]};
  }
  return best;
}
function buildPitches(A,B){
  var r=solve(A,B); if(!r) return null;
  var games=[];
  r.counts.forEach(function(c,i){ for(var k=0;k<c;k++){
    var sz=GAME[i][0]; games.push([Math.max(sz[0],sz[1]),Math.min(sz[0],sz[1])]); } });
  var perGame=games.map(function(g){
    var s0=g[0], s1=g[1], cands=[];
    for(var h0=0;h0<=s0;h0++) for(var h1=0;h1<=s1;h1++){
      var a0=s0-h0, a1=s1-h1;
      var side0Mixed=(h0>0&&a0>0), side1Mixed=(h1>0&&a1>0);
      var mixedTeams=(side0Mixed?1:0)+(side1Mixed?1:0);
      var side0PureH=(h0===s0), side0PureA=(a0===s0);
      var side1PureH=(h1===s1), side1PureA=(a1===s1);
      var isFixture=(side0PureH&&side1PureA)||(side0PureA&&side1PureH);
      var sameClub=(mixedTeams===0 && !isFixture)?1:0;
      cands.push({h:h0+h1,h0:h0,a0:a0,h1:h1,a1:a1,mixedTeams:mixedTeams,sameClub:sameClub,fixture:isFixture?1:0});
    }
    return cands;
  });
  var dp=[{}]; dp[0][0]={cost:[0,0,0],pick:[]};
  for(var gi=0; gi<perGame.length; gi++){
    var ndp={}, layer=dp[gi];
    for(var hk in layer){
      var hUsed=+hk, st=layer[hk];
      perGame[gi].forEach(function(cand,ci){
        var nh=hUsed+cand.h; if(nh>A) return;
        var nc=[st.cost[0]+cand.sameClub, st.cost[1]+cand.mixedTeams, st.cost[2]-cand.fixture];
        var cur=ndp[nh];
        if(cur===undefined || lex(nc,cur.cost)<0){ ndp[nh]={cost:nc,pick:st.pick.concat([ci])}; }
      });
    }
    dp[gi+1]=ndp;
  }
  var fin=dp[games.length][A];
  if(!fin){ return {games:games.map(function(g){return {sides:[{h:g[0],a:0,size:g[0]},{h:0,a:g[1],size:g[1]}]};}), mixed:r.mixed}; }
  var out=games.map(function(g,gi){
    var cand=perGame[gi][fin.pick[gi]];
    return {sides:[{h:cand.h0,a:cand.a0,size:g[0]},{h:cand.h1,a:cand.a1,size:g[1]}]};
  });
  out.forEach(function(g){ if((g.sides[1].h-g.sides[1].a)>(g.sides[0].h-g.sides[0].a)) g.sides=[g.sides[1],g.sides[0]]; });
  var mixed=0; out.forEach(function(g){ g.sides.forEach(function(sd){ if(sd.h>0&&sd.a>0)mixed++; }); });
  return {games:out, mixed:mixed};
}
function pips(side){
  var s='';
  for(var i=0;i<side.h;i++) s+='<span class="pip A">H</span>';
  for(var j=0;j<side.a;j++) s+='<span class="pip B">A</span>';
  return s;
}
function teamBlock(side){
  var isStar=(side.h>0&&side.a>0);
  var srt=(isStar?(side.h+' Home + '+side.a+' Away'):(side.size+' '+(side.h>0?'Home':'Away')))+' player'+(side.size>1?'s':'');
  return '<div class="team"><span class="sr-only">'+srt+'</span><div class="pips" aria-hidden="true">'+pips(side)+'</div>'+
         (isStar?'<span class="star-tag">Superstar</span>':'<span class="tlabel">'+(side.h>0?'Home':'Away')+'</span>')+'</div>';
}
function fmtName(g){ return g.sides[0].size+'v'+g.sides[1].size; }
function isTiny(g){ var a=g.sides[0].size,b=g.sides[1].size;
  return (Math.max(a,b)<=2&&Math.min(a,b)<=1)|| (a===1&&b===1) || (a+b<=3); }

// ─── Persistence ───────────────────────────────────────────────────────────
var STORAGE_KEY = 'ff_planner_v1';

function saveState() {
  try {
    var state = {
      a: document.getElementById('inA').value,
      b: document.getElementById('inB').value,
      nameA: document.getElementById('nameA').value,
      nameB: document.getElementById('nameB').value,
      ts: Date.now()
    };

}

function loadState() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    var state = JSON.parse(raw);
    if (state.a !== undefined) document.getElementById('inA').value = state.a;
    if (state.b !== undefined) document.getElementById('inB').value = state.b;
    if (state.nameA) document.getElementById('nameA').value = state.nameA;
    if (state.nameB) document.getElementById('nameB').value = state.nameB;

}

// ─── Usage tracking ─────────────────────────────────────────────────────────
var USAGE_KEY = 'ff_usage_v1';

function getUsage() {
  try {
    var raw = localStorage.getItem(USAGE_KEY);
    return raw ? JSON.parse(raw) : { sessions: 0, plans: 0, firstSeen: null, lastSeen: null };
  } catch(e) {
    return { sessions: 0, plans: 0, firstSeen: null, lastSeen: null };
  }
}

function saveUsage(u) {
  try { localStorage.setItem(USAGE_KEY, JSON.stringify(u)); } catch(e) {}
}

function trackSession() {
  var u = getUsage();
  u.sessions = (u.sessions || 0) + 1;
  u.firstSeen = u.firstSeen || new Date().toISOString();
  u.lastSeen = new Date().toISOString();
  saveUsage(u);

  // Fire to Firebase if available
  if (window._logEvent && window._analytics) {
    window._logEvent(window._analytics, 'session_start', { sessions_total: u.sessions });
  }
}

function trackPlan(A, B, pitches, stars) {
  var u = getUsage();
  u.plans = (u.plans || 0) + 1;
  saveUsage(u);

  // Fire to Firebase if available
  if (window._logEvent && window._analytics) {
    window._logEvent(window._analytics, 'plan_generated', {
      home_players: A,
      away_players: B,

}

function trackShare(method) {

    window._logEvent(window._analytics, 'share', {
      method: method,
      content_type: 'matchday_plan'
    });

}

// ─── Toast ──────────────────────────────────────────────────────────────────
var toastTimer;
function showToast(msg) {

  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 2200);

// ─── Share ──────────────────────────────────────────────────────────────────
function getShareText(A, B, pitches, nameA, nameB) {
  var home = nameA || 'Home';
  var away = nameB || 'Away';
  return home + ' ' + A + ' v ' + B + ' ' + away + ' — ' + pitches + ' ' + (pitches === 1 ? 'pitch' : 'pitches') + ' needed. Planned with FutureFit 3v3 Matchday Planner.';
}

function doShare(A, B, pitches, nameA, nameB) {
  var text = getShareText(A, B, pitches, nameA, nameB);
  var url = 'https://first3things.github.io/futurefit/';

  if (navigator.share) {
    navigator.share({ title: '3v3 Matchday Plan', text: text, url: url })
      .then(function(){ trackShare('native'); })
      .catch(function(){});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text + ' ' + url).then(function(){
      showToast('Copied to clipboard ✓');
      trackShare('clipboard');
    });

    trackShare('sms_fallback');
  }
}

// ─── Game time calculator ────────────────────────────────────────────────────
// Rules:
//   - Game duration: 6–10 min (FA hard limits)
//   - Total playing time per child: 30–40 min (FA hard limits)
//   - Rotations = how many games each child plays
//   - In a full carousel, rotations = pitches (every team plays every other)
//   - If 6 min × pitches > 40 min, reduce rotations to stay within 40 min hard cap
//   - Target the 35 min midpoint; surface rotations clearly
var GT_MIN = 6, GT_MAX = 10, PT_MIN = 30, PT_MAX = 40, PT_TARGET = 35;

function calcGameTime(pitches) {
  if (!pitches || pitches < 1) return null;

  // Max rotations allowed by the 40 min hard cap at minimum game time
  var maxRotations = Math.floor(PT_MAX / GT_MIN);  // = 6
  var rotations = Math.min(pitches, maxRotations);
  var fullCarousel = (rotations === pitches);

  // Find the best game duration for these rotations targeting 35 min
  var idealMins = Math.round(PT_TARGET / rotations);
  var mins = Math.min(GT_MAX, Math.max(GT_MIN, idealMins));
  var totalMins = mins * rotations;

  // Check if total is within the hard 30–40 min band
  var totalInRange = (totalMins >= PT_MIN && totalMins <= PT_MAX);
  var gameInRange  = (mins >= GT_MIN && mins <= GT_MAX);

  return {
    mins: mins,
    rotations: rotations,
    pitches: pitches,
    fullCarousel: fullCarousel,
    totalMins: totalMins,
    totalInRange: totalInRange,
    gameInRange: gameInRange
  };
}

// ─── Timer engine ────────────────────────────────────────────────────────────
var timer = {
  duration: 8 * 60,   // seconds — updated when game time is calculated
  remaining: 8 * 60,
  running: false,
  interval: null,
  ctx: null           // AudioContext, created on first user interaction

};

function timerFmt(secs) {
  var m = Math.floor(secs / 60);
  var s = secs % 60;
  return m + ':' + (s < 10 ? '0' : '') + s;
}

function timerState() {
  var pct = timer.duration > 0 ? (timer.remaining / timer.duration) * 100 : 0;
  var cls = '';
  if (timer.remaining <= 30) cls = 'danger';
  else if (timer.remaining <= 60) cls = 'warning';
  return { pct: pct, cls: cls };
}

function timerUpdateUI() {
  var face = document.getElementById('timerFace');
  var bar = document.getElementById('timerBar');
  var startBtn = document.getElementById('timerStart');
  var resetBtn = document.getElementById('timerReset');
  if (!face) return;

  var st = timerState();
  face.textContent = timerFmt(timer.remaining);
  face.className = 'timer-face' + (st.cls ? ' ' + st.cls : '');
  bar.style.width = st.pct + '%';
  bar.className = 'timer-progress-bar' + (st.cls ? ' ' + st.cls : '');

  if (startBtn) {
    var done = (timer.remaining === 0 && !timer.running);
    if (done) {
      startBtn.className = 'timer-btn reset';
      startBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.32"/></svg> Reset';
      startBtn.onclick = timerReset;
    } else if (timer.running) {
      startBtn.className = 'timer-btn pause';
      startBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> Pause';
      startBtn.onclick = timerPause;
    } else {
      startBtn.className = 'timer-btn start';
      startBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><polygon points="5,3 19,12 5,21"/></svg> ' + (timer.remaining < timer.duration ? 'Resume' : 'Start');
      startBtn.onclick = timerStart;
    }
  }
}

function whistleSound() {
  try {
    if (!timer.ctx) timer.ctx = new (window.AudioContext || window.webkitAudioContext)();
    var ctx = timer.ctx;

    function play() {
      var now = ctx.currentTime;

      // pitchEnd: optional final pitch to ramp to at the end (for the rising third peep)
      function blast(startT, dur, pitchEnd) {
        var osc = ctx.createOscillator();
        var oscGain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(2700, now + startT);
        osc.frequency.linearRampToValueAtTime(2900, now + startT + 0.04);

        // Third peep: hold steady then push up sharply in the final third
        if (pitchEnd) {
          osc.frequency.setValueAtTime(2900, now + startT + dur * 0.6);
          osc.frequency.exponentialRampToValueAtTime(pitchEnd, now + startT + dur - 0.04);
        }

        // LFO — pea wobble
        var lfo = ctx.createOscillator();
        var lfoGain = ctx.createGain();
        lfo.type = 'sine';
        lfo.frequency.setValueAtTime(18, now + startT);
        lfoGain.gain.setValueAtTime(110, now + startT);
        // Reduce wobble depth during the pitch rise so the sweep reads clearly
        if (pitchEnd) {
          lfoGain.gain.linearRampToValueAtTime(40, now + startT + dur - 0.05);
        }
        lfo.connect(lfoGain);
        lfoGain.connect(osc.frequency);

        // Noise — air/breath texture
        var bufSize = Math.ceil(ctx.sampleRate * (dur + 0.15));
        var buffer = ctx.createBuffer(1, bufSize, ctx.sampleRate);
        var data = buffer.getChannelData(0);
        for (var i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
        var noise = ctx.createBufferSource();
        noise.buffer = buffer;
        var noiseFilter = ctx.createBiquadFilter();
        noiseFilter.type = 'bandpass';
        noiseFilter.frequency.setValueAtTime(2800, now + startT);
        if (pitchEnd) noiseFilter.frequency.exponentialRampToValueAtTime(pitchEnd * 0.95, now + startT + dur - 0.04);
        noiseFilter.Q.setValueAtTime(8, now + startT);
        var noiseGain = ctx.createGain();
        noiseGain.gain.setValueAtTime(0.07, now + startT);
        // Slight noise swell on third peep — more air pushing through
        if (pitchEnd) noiseGain.gain.linearRampToValueAtTime(0.11, now + startT + dur * 0.7);
        noise.connect(noiseFilter);
        noiseFilter.connect(noiseGain);
        noiseGain.connect(ctx.destination);

        // Amplitude envelope
        oscGain.gain.setValueAtTime(0, now + startT);
        oscGain.gain.linearRampToValueAtTime(0.45, now + startT + 0.015);
        oscGain.gain.setValueAtTime(0.45, now + startT + dur - 0.03);
        oscGain.gain.linearRampToValueAtTime(0, now + startT + dur);

        osc.connect(oscGain);
        oscGain.connect(ctx.destination);

        osc.start(now + startT);   osc.stop(now + startT + dur + 0.05);
        lfo.start(now + startT);   lfo.stop(now + startT + dur + 0.05);
        noise.start(now + startT); noise.stop(now + startT + dur + 0.05);
      }

      // Vibrate in sync with the three peeps
      if (navigator.vibrate) navigator.vibrate([250, 120, 250, 120, 700]);

      // peep (0.25s) — peep (0.25s) — peeeeep (0.7s, steady)
      blast(0,    0.25);
      blast(0.42, 0.25);
      blast(0.84, 0.7);
    }

    if (ctx.state === 'suspended') {
      ctx.resume().then(play);
    } else {
      play();
    }
  } catch(e) {}
}

function timerStart() {
  // Initialise AudioContext on user gesture (required by browsers)
  if (!timer.ctx) {
    try { timer.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  if (timer.remaining <= 0) timerReset();
  timer.running = true;
  timer.interval = setInterval(function() {
    timer.remaining = Math.max(0, timer.remaining - 1);
    timerUpdateUI();
    if (timer.remaining === 0) {
      timer.running = false;
      clearInterval(timer.interval);
      whistleSound();
      // Vibrate on mobile if available
      timerUpdateUI();
      if (window._logEvent && window._analytics) {
        window._logEvent(window._analytics, 'timer_complete', { duration_mins: Math.round(timer.duration / 60) });
      }
    }
  }, 1000);
  timerUpdateUI();
}

function timerPause() {
  timer.running = false;
  clearInterval(timer.interval);
  timerUpdateUI();
}

function timerToggle() {
  if (timer.running) timerPause(); else timerStart();
}

function timerReset() {
  timer.running = false;
  clearInterval(timer.interval);
  timer.remaining = timer.duration;
  timerUpdateUI();
}

function timerSetDuration(mins) {
  var wasRunning = timer.running;
  timerPause();
  timer.duration = mins * 60;
  timer.remaining = timer.duration;
  if (wasRunning) timerStart();
  else timerUpdateUI();
}

function timerAdjust(delta) {
  var adjEl = document.getElementById('timerAdjVal');
  if (!adjEl) return;
  var cur = parseInt(adjEl.dataset.mins || timer.duration / 60, 10);
  var next = Math.min(10, Math.max(6, cur + delta));
  adjEl.dataset.mins = next;
  adjEl.textContent = next + ' min';
  timerSetDuration(next);
}

// ─── Render ──────────────────────────────────────────────────────────────────
var lastPlanA = 0, lastPlanB = 0, lastPitches = 0;

function buildGameTimeCard(pitches) {
  var gt = calcGameTime(pitches);
  if (!gt) return '';

  // Update timer duration to match recommendation only when not mid-count
  if (!timer.running && timer.remaining === timer.duration) {
    timer.duration = gt.mins * 60;
    timer.remaining = timer.duration;
  } else if (!timer.running) {
    timer.duration = gt.mins * 60;
  }

  var adjMins = (!timer.running && timer.duration !== gt.mins * 60)
    ? Math.round(timer.duration / 60) : gt.mins;

  // Warning if rotations are reduced (not a full carousel)
  var warnHtml = '';
  if (!gt.fullCarousel) {
    warnHtml = '<div class="gametime-warn">' +
      '<strong>Rotations reduced to ' + gt.rotations + '</strong> — with ' + pitches + ' pitches, playing all ' + pitches + ' rotations at 6 min would give ' + (pitches * 6) + ' min per player, exceeding the FA&rsquo;s 40 min hard cap. ' +
      'Use <strong>' + gt.rotations + ' rotations</strong> so teams play <strong>' + gt.rotations + ' games each</strong> — not every team will play every other. Total playing time: ~' + gt.totalMins + ' min.' +
    '</div>';
  }

  return '<div class="gametime-card">' +
    '<div class="gametime-head">' +
      '<span class="gametime-title">Game time &amp; rotations</span>' +
    '</div>' +
    '<div class="gametime-rec">' +
      '<span class="gametime-num">' + gt.mins + '</span>' +
      '<span class="gametime-unit">min</span>' +
    '</div>' +
    '<div class="gametime-range">per game · ' + gt.rotations + ' rotation' + (gt.rotations !== 1 ? 's' : '') + ' &times; ' + gt.mins + ' min = ~' + gt.totalMins + ' min per player</div>' +
    '<div class="gametime-meta">' +
      '<span class="gametime-chip">Game time <b>' + GT_MIN + '–' + GT_MAX + '</b> min</span>' +
      '<span class="gametime-chip">Playing time <b>' + PT_MIN + '–' + PT_MAX + '</b> min</span>' +
      '<span class="gametime-chip"><b>' + gt.rotations + '</b> rotation' + (gt.rotations !== 1 ? 's' : '') + (gt.fullCarousel ? ' · full carousel' : ' · reduced') + '</span>' +
    '</div>' +
    warnHtml +
    '<div class="timer-section">' +
      '<div class="timer-label">Countdown timer</div>' +
      '<div class="timer-display">' +
        '<span class="timer-face" id="timerFace">' + timerFmt(timer.remaining) + '</span>' +
        '<div class="timer-controls">' +
          '<button class="timer-btn start" id="timerStart" aria-label="Start timer">' +
            '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><polygon points="5,3 19,12 5,21"/></svg> Start' +
          '</button>' +
          '<button class="timer-btn reset" id="timerReset" aria-label="Reset timer">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.32"/></svg>' +
          '</button>' +
        '</div>' +
      '</div>' +
      '<div class="timer-adj">' +
        '<span class="timer-adj-label">Adjust:</span>' +
        '<button class="timer-adj-btn" id="timerAdjDn" aria-label="Decrease game time">&minus;</button>' +
        '<span class="timer-adj-val" id="timerAdjVal" data-mins="' + adjMins + '">' + adjMins + ' min</span>' +
        '<button class="timer-adj-btn" id="timerAdjUp" aria-label="Increase game time">+</button>' +
        '<button class="timer-btn reset" id="whistlePreview" aria-label="Preview whistle sound" style="margin-left:auto;height:34px;padding:0 12px;font-size:.78rem">🎵 Test whistle</button>' +
      '</div>' +
      '<div class="timer-progress"><div class="timer-progress-bar" id="timerBar" style="width:100%"></div></div>' +
    '</div>' +
  '</div>';
}

function render(){
  var A = Math.max(0, parseInt(document.getElementById('inA').value || 0, 10));
  var B = Math.max(0, parseInt(document.getElementById('inB').value || 0, 10));
  var nameA = document.getElementById('nameA').value.trim();
  var nameB = document.getElementById('nameB').value.trim();
  var homeLabel = nameA || 'Home';
  var awayLabel = nameB || 'Away';
  var total = A + B;
  var el = document.getElementById('result');

  saveState();

  if (total < 2) {
    el.innerHTML = '<div class="warn" role="status">Add at least <strong>2 players</strong> in total to build a matchday plan.</div>';
    return;
  }

  var b = buildPitches(A, B);
  if (!b) {
    el.innerHTML = '<div class="warn">No valid arrangement for ' + total + ' players. Try adding or removing a player.</div>';
    return;
  }

  var pitches = b.games.length, stars = b.mixed;
  var tiny = b.games.filter(isTiny).length;
  var notFull = b.games.filter(function(g){ return !(g.sides[0].size === 3 && g.sides[1].size === 3); }).length;

  // Track plan if numbers changed
  if (A !== lastPlanA || B !== lastPlanB) {
    lastPlanA = A; lastPlanB = B; lastPitches = pitches;
    trackPlan(A, B, pitches, stars);
  }

  var cards = '';
  b.games.forEach(function(g, i){
    var tny = isTiny(g);
    var fmt = fmtName(g);
    var srText = 'Pitch ' + (i+1) + ', ' + g.sides[0].size + ' versus ' + g.sides[1].size + (tny ? ', smaller game' : '') + '.';
    cards += '<div class="pitch' + (tny ? ' tiny' : '') + '" role="group" aria-label="' + srText + '">' +
      '<div class="pitchhead"><span class="pno">Pitch ' + (i+1) + '</span>' +
        '<span class="fmt">' + (tny ? '<span class="fmt-ic" aria-hidden="true">&#9650;</span> ' : '') + fmt + '</span></div>' +
      '<div class="pitchbody">' + teamBlock(g.sides[0]) + '<span class="vs" aria-hidden="true">v</span>' + teamBlock(g.sides[1]) + '</div></div>';
  });

  var tinyNote = tiny ? '<p class="note tiny-note">A <strong>1v1</strong> or <strong>2v1</strong> is included (shown in amber). It&rsquo;s perfectly playable and keeps everyone involved, though a fuller game is preferable where the numbers allow.</p>' : '';

  var u = getUsage();

  el.innerHTML =
    '<div class="hero">' +
      '<div class="pitchcount">' +
        '<span class="bignum">' + pitches + '</span>' +
        '<span class="pitchlabel">' + (pitches === 1 ? 'Pitch' : 'Pitches') + '<span class="l2">needed</span></span>' +
      '</div>' +
      '<div class="meta">' +
        '<span class="chip"><b>' + total + '</b> players</span>' +
        '<span class="chip"><b>' + stars + '</b> superstar ' + (stars === 1 ? 'team' : 'teams') + '</span>' +
        (notFull ? '<span class="chip"><b>' + notFull + '</b> not full 3v3</span>' : '<span class="chip">All full 3v3</span>') +
      '</div>' +

    '</div>' +
    buildGameTimeCard(pitches) +
    '<h2>The games</h2><div class="pitches">' + cards + '</div>' +
    tinyNote +

    '<h2>3v3 essentials</h2>' +
    '<div class="facts">' +
      '<div class="fact"><span class="fact-k">Pitch</span><span class="fact-v">15 &times; 10m</span><span class="fact-s">up to 20 &times; 15m</span></div>' +
      '<div class="fact"><span class="fact-k">Goals</span><span class="fact-v">120 &times; 75cm</span><span class="fact-s">4 &times; 2.5ft</span></div>' +
      '<div class="fact"><span class="fact-k">Ball</span><span class="fact-v">Size 3</span><span class="fact-s">no goalkeepers</span></div>' +
      '<div class="fact"><span class="fact-k">Each game</span><span class="fact-v">6&ndash;10 min</span><span class="fact-s">carousel rotate</span></div>' +
      '<div class="fact"><span class="fact-k">Playing time</span><span class="fact-v">30&ndash;40 min</span><span class="fact-s">per player</span></div>' +
    '</div>' +
    '<p class="note">No substitutes — every player is on a pitch. <span style="color:var(--clubA);font-weight:700">H</span> = ' + homeLabel + ' player, <span style="color:var(--clubB);font-weight:700">A</span> = ' + awayLabel + ' player. A <strong>superstar team</strong> mixes both clubs. Where numbers don&rsquo;t divide neatly, smaller or uneven games are fine under FA FutureFit guidance — the main thing is that everyone plays.</p>';

  // Wire timer buttons via onclick (safe against duplicate renders)
  var startBtn2 = document.getElementById('timerStart');
  var resetBtn = document.getElementById('timerReset');
  var adjDn = document.getElementById('timerAdjDn');
  var adjUp = document.getElementById('timerAdjUp');
  if (resetBtn) resetBtn.onclick = timerReset;
  if (adjDn) adjDn.onclick = function(){ timerAdjust(-1); };
  if (adjUp) adjUp.onclick = function(){ timerAdjust(1); };
  var whistleBtn = document.getElementById('whistlePreview');
  if (whistleBtn) whistleBtn.onclick = whistleSound;
  // startBtn onclick is set inside timerUpdateUI

  timerUpdateUI();
}

// ─── Event listeners ─────────────────────────────────────────────────────────
document.querySelectorAll('.stepper button').forEach(function(btn){
  btn.addEventListener('click', function(){
    var inp = document.getElementById(btn.dataset.t === 'A' ? 'inA' : 'inB');
    inp.value = Math.max(0, (parseInt(inp.value || 0, 10)) + parseInt(btn.dataset.d, 10));
    render();
  });
});

function clamp(id){
  var el = document.getElementById(id);
  var v = parseInt(el.value || 0, 10);
  if (isNaN(v)) v = 0;
  if (v < 0) v = 0;
  if (v > 200) v = 200;
  if (String(v) !== el.value) el.value = v;
}

['inA', 'inB'].forEach(function(id){
  document.getElementById(id).addEventListener('input', function(){ clamp(id); render(); });
});

['nameA', 'nameB'].forEach(function(id){
  document.getElementById(id).addEventListener('input', render);
});

// ─── Init ────────────────────────────────────────────────────────────────────
loadState();
trackSession();
render();
</script>
</body>
</html>
