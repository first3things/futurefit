<script>
var GAME=[ [[3,3],6],[[3,2],5],[[2,2],4],[[3,1],4],[[2,1],3],[[1,1],2] ];
function lex(x,y){for(var i=0;i<x.length;i++){if(x[i]!==y[i])return x[i]<y[i]?-1:1;}return 0;}
function solve(A,B){
  var total=A+B; if(total<2) return null;
  var results=[];
  (function rec(i,rem,counts){
    if(rem===0){results.push(counts.slice());return;}
    if(i===GAME.length) return;
    var sp=GAME[i][1];
    for(var c=0;c<=Math.floor(rem/sp);c++) rec(i+1,rem-c*sp,counts.concat([c]));
  })(0,total,[]);
  var best=null;
  for(var r=0;r<results.length;r++){
    var counts=results[r];
    var npitch=counts.reduce(function(a,b){return a+b;},0);
    if(!npitch) continue;
    var uneven=0,defi=0,imb=0,teamSizes=[],ones=0,oneTeams=0;
    counts.forEach(function(c,idx){ if(!c)return; var g=GAME[idx][0],tot=GAME[idx][1],s1=g[0],s2=g[1];
      for(var k=0;k<c;k++){teamSizes.push(s1,s2); if(!(s1===3&&s2===3))uneven++; defi+=6-tot; imb+=Math.abs(s1-s2); if(s1===1&&s2===1)ones++; if(s1===1)oneTeams++; if(s2===1)oneTeams++;}
    });
    if(ones>0 && total>2) continue;
    var dp={0:0};
    for(var ts=0;ts<teamSizes.length;ts++){ var s=teamSizes[ts],ndp={};
      for(var hs in dp){ var hsum=+hs,mixed=dp[hs];
        for(var h=0;h<=s;h++){ var a=s-h,nh=hsum+h; if(nh>A)continue;
          var nm=mixed+((h===s||a===s)?0:1);
          if(ndp[nh]===undefined||ndp[nh]>nm) ndp[nh]=nm; } }
      dp=ndp; }
    if(dp[A]===undefined) continue;
    var score=[oneTeams,uneven,imb,defi,dp[A],npitch];
    if(best===null||lex(score,best.score)<0) best={score:score,counts:counts,mixed:dp[A]};
  }
  return best;
}
function buildPitches(A,B){
  var r=solve(A,B); if(!r) return null;
  var games=[];
  r.counts.forEach(function(c,i){ for(var k=0;k<c;k++){
    var sz=GAME[i][0]; games.push([Math.max(sz[0],sz[1]),Math.min(sz[0],sz[1])]); } });
  var perGame=games.map(function(g){
    var s0=g[0], s1=g[1], cands=[];
    for(var h0=0;h0<=s0;h0++) for(var h1=0;h1<=s1;h1++){
      var a0=s0-h0, a1=s1-h1;
      var side0Mixed=(h0>0&&a0>0), side1Mixed=(h1>0&&a1>0);
      var mixedTeams=(side0Mixed?1:0)+(side1Mixed?1:0);
      var side0PureH=(h0===s0), side0PureA=(a0===s0);
      var side1PureH=(h1===s1), side1PureA=(a1===s1);
      var isFixture=(side0PureH&&side1PureA)||(side0PureA&&side1PureH);
      var sameClub=(mixedTeams===0 && !isFixture)?1:0;
      cands.push({h:h0+h1,h0:h0,a0:a0,h1:h1,a1:a1,mixedTeams:mixedTeams,sameClub:sameClub,fixture:isFixture?1:0});
    }
    return cands;
  });
  var dp=[{}]; dp[0][0]={cost:[0,0,0],pick:[]};
  for(var gi=0; gi<perGame.length; gi++){
    var ndp={}, layer=dp[gi];
    for(var hk in layer){
      var hUsed=+hk, st=layer[hk];
      perGame[gi].forEach(function(cand,ci){
        var nh=hUsed+cand.h; if(nh>A) return;
        var nc=[st.cost[0]+cand.sameClub, st.cost[1]+cand.mixedTeams, st.cost[2]-cand.fixture];
        var cur=ndp[nh];
        if(cur===undefined || lex(nc,cur.cost)<0){ ndp[nh]={cost:nc,pick:st.pick.concat([ci])}; }
      });
    }
    dp[gi+1]=ndp;
  }
  var fin=dp[games.length][A];
  if(!fin){ return {games:games.map(function(g){return {sides:[{h:g[0],a:0,size:g[0]},{h:0,a:g[1],size:g[1]}]};}), mixed:r.mixed}; }
  var out=games.map(function(g,gi){
    var cand=perGame[gi][fin.pick[gi]];
    return {sides:[{h:cand.h0,a:cand.a0,size:g[0]},{h:cand.h1,a:cand.a1,size:g[1]}]};
  });
  out.forEach(function(g){ if((g.sides[1].h-g.sides[1].a)>(g.sides[0].h-g.sides[0].a)) g.sides=[g.sides[1],g.sides[0]]; });
  var mixed=0; out.forEach(function(g){ g.sides.forEach(function(sd){ if(sd.h>0&&sd.a>0)mixed++; }); });
  return {games:out, mixed:mixed};
}
function pips(side){
  var s='';
  for(var i=0;i<side.h;i++) s+='<span class="pip A">H</span>';
  for(var j=0;j<side.a;j++) s+='<span class="pip B">A</span>';
  return s;
}
function teamBlock(side){
  var isStarLocal=(side.h>0&&side.a>0);
  var isStar=isStarLocal;
  var srt=(isStar?(side.h+' Home + '+side.a+' Away'):(side.size+' '+(side.h>0?'Home':'Away')))+' player'+(side.size>1?'s':'');
  return '<div class="team"><span class="sr-only">'+srt+'</span><div class="pips" aria-hidden="true">'+pips(side)+'</div>'+
         (isStar?'<span class="star-tag">Superstar</span>':'<span class="tlabel">'+(side.h>0?'Home':'Away')+'</span>')+'</div>';
}
function fmtName(g){ return g.sides[0].size+'v'+g.sides[1].size; }
function isTiny(g){ var a=g.sides[0].size,b=g.sides[1].size; var mx=Math.max(a,b),mn=Math.min(a,b);
  return (mx<=2&&mn<=1)|| (a===1&&b===1) || (a+b<=3); }
function render(){
  var A=Math.max(0,parseInt(document.getElementById('inA').value||0,10));
  var B=Math.max(0,parseInt(document.getElementById('inB').value||0,10));
  var total=A+B,el=document.getElementById('result');
  if(total<2){el.innerHTML='<div class="warn" role="status">Add at least <strong>2 players</strong> in total to build a matchday plan.</div>';return;}
  var b=buildPitches(A,B);
  if(!b){el.innerHTML='<div class="warn">No valid arrangement for '+total+' players. Try adding or removing a player.</div>';return;}
  var pitches=b.games.length, stars=b.mixed;
  var tiny=b.games.filter(isTiny).length;
  var notFull=b.games.filter(function(g){return !(g.sides[0].size===3&&g.sides[1].size===3);}).length;

  var cards='';
  b.games.forEach(function(g,i){
    var tny=isTiny(g);
    var fmt=fmtName(g);
    var srText='Pitch '+(i+1)+', '+g.sides[0].size+' versus '+g.sides[1].size+(tny?', smaller game':'')+'.';
    cards+='<div class="pitch'+(tny?' tiny':'')+'" role="group" aria-label="'+srText+'">'+
      '<div class="pitchhead"><span class="pno">Pitch '+(i+1)+'</span>'+
        '<span class="fmt">'+(tny?'<span class="fmt-ic" aria-hidden="true">&#9650;</span> ':'')+fmt+'</span></div>'+
      '<div class="pitchbody">'+teamBlock(g.sides[0])+'<span class="vs" aria-hidden="true">v</span>'+teamBlock(g.sides[1])+'</div></div>';
  });

  var tinyNote = tiny? '<p class="note tiny-note">A <strong>1v1</strong> or <strong>2v1</strong> is included (shown in amber). It&rsquo;s perfectly playable and keeps everyone involved, though a fuller game is preferable where the numbers allow.</p>' : '';

  el.innerHTML=
    '<div class="hero"><div class="pitchcount">'+
    '<span class="bignum">'+pitches+'</span>'+
    '<span class="pitchlabel">'+(pitches===1?'Pitch':'Pitches')+'<span class="l2">needed</span></span>'+
    '</div>'+
    '<div class="meta">'+
    '<span class="chip"><b>'+total+'</b> players</span>'+
    '<span class="chip"><b>'+stars+'</b> superstar '+(stars===1?'team':'teams')+'</span>'+
    (notFull?'<span class="chip"><b>'+notFull+'</b> not full 3v3</span>':'<span class="chip">All full 3v3</span>')+
    '</div></div>'+
    '<h2>The games</h2><div class="pitches">'+cards+'</div>'+
    tinyNote+
    '<h2>3v3 essentials</h2>'+
    '<div class="facts">'+
    '<div class="fact"><span class="fact-k">Pitch</span><span class="fact-v">15 &times; 10m</span><span class="fact-s">up to 20 &times; 15m</span></div>'+
    '<div class="fact"><span class="fact-k">Goals</span><span class="fact-v">120 &times; 75cm</span><span class="fact-s">4 &times; 2.5ft</span></div>'+
    '<div class="fact"><span class="fact-k">Ball</span><span class="fact-v">Size 3</span><span class="fact-s">no goalkeepers</span></div>'+
    '<div class="fact"><span class="fact-k">Each game</span><span class="fact-v">6&ndash;10 min</span><span class="fact-s">carousel rotate</span></div>'+
    '<div class="fact"><span class="fact-k">Playing time</span><span class="fact-v">30&ndash;40 min</span><span class="fact-s">per player</span></div>'+
    '</div>'+
    '<p class="note">No substitutes — every player is on a pitch. <span style="color:var(--clubA);font-weight:700">H</span> = Home player, <span style="color:var(--clubB);font-weight:700">A</span> = Away player. A <strong>superstar team</strong> mixes both clubs. Where numbers don&rsquo;t divide neatly, smaller or uneven games are fine under FA FutureFit guidance — the main thing is that everyone plays.</p>';
}
document.querySelectorAll('.stepper button').forEach(function(btn){
  btn.addEventListener('click',function(){
    var inp=document.getElementById(btn.dataset.t==='A'?'inA':'inB');
    inp.value=Math.max(0,(parseInt(inp.value||0,10))+parseInt(btn.dataset.d,10));
    render();
  });
});
function clamp(id){var el=document.getElementById(id);var v=parseInt(el.value||0,10);if(isNaN(v))v=0;if(v<0)v=0;if(v>200)v=200;if(String(v)!==el.value)el.value=v;return v;}
['inA','inB'].forEach(function(id){document.getElementById(id).addEventListener('input',function(){clamp(id);render();});});
render();
</script>
</body>
</html>
